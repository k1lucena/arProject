<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>k1 WebAR</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    :root {
      --panel: rgba(7, 14, 24, 0.84);
      --border: rgba(74, 209, 255, 0.42);
      --text: #eef8ff;
      --muted: #b7c6d8;
      --error-bg: rgba(75, 12, 20, 0.92);
      --error-border: rgba(255, 111, 145, 0.65);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #02050b;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
    }

    .hud {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .instruction,
    .status,
    .error {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 420px);
      padding: 12px 16px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      text-align: center;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(6px);
    }

    .status {
      top: max(16px, env(safe-area-inset-top));
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .instruction {
      bottom: max(16px, env(safe-area-inset-bottom));
      font-size: 0.98rem;
    }

    .error {
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
      background: var(--error-bg);
      border-color: var(--error-border);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .error.is-visible {
      display: block;
    }
  </style>
</head>
<body>
  <div class="hud">
    <div class="status">WebAR k1 | Hiro Marker</div>
    <div class="error" id="error-message" role="alert"></div>
    <div class="instruction">Aponte a c&acirc;mera para o marcador impresso.</div>
  </div>

  <a-scene
    id="ar-scene"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
    renderer="alpha: true; antialias: false; precision: mediump; logarithmicDepthBuffer: false; colorManagement: false; sortObjects: true;"
    arjs="sourceType: webcam; trackingMethod: best; debugUIEnabled: false; detectionMode: mono; matrixCodeType: 3x3;"
  >
    <a-marker preset="hiro">
      <a-entity id="k1-logo" position="0 0.24 0" rotation="-90 0 0" scale="0.72 0.72 0.72">
        <!-- Estrutura leve da logo -->
        <a-box
          position="-0.34 0 0.02"
          width="0.14"
          height="0.72"
          depth="0.14"
          color="#4c525b"
          material="metalness: 0.92; roughness: 0.28; emissive: #0d131c; emissiveIntensity: 0.1;"
        ></a-box>
        <a-box
          position="-0.14 0.2 0.02"
          width="0.42"
          height="0.11"
          depth="0.12"
          rotation="0 0 40"
          color="#5a616b"
          material="metalness: 0.94; roughness: 0.24; emissive: #0d131c; emissiveIntensity: 0.1;"
        ></a-box>
        <a-box
          position="-0.14 -0.18 0.02"
          width="0.44"
          height="0.11"
          depth="0.12"
          rotation="0 0 -40"
          color="#5a616b"
          material="metalness: 0.94; roughness: 0.24; emissive: #0d131c; emissiveIntensity: 0.1;"
        ></a-box>

        <a-box
          position="0.34 0 0.02"
          width="0.16"
          height="0.74"
          depth="0.14"
          color="#4f5660"
          material="metalness: 0.95; roughness: 0.22; emissive: #0d131c; emissiveIntensity: 0.1;"
        ></a-box>
        <a-box
          position="0.26 0.28 0.02"
          width="0.2"
          height="0.1"
          depth="0.12"
          rotation="0 0 -30"
          color="#6a727d"
          material="metalness: 0.9; roughness: 0.25; emissive: #0d131c; emissiveIntensity: 0.08;"
        ></a-box>
        <a-box
          position="0.34 -0.35 0.02"
          width="0.3"
          height="0.1"
          depth="0.14"
          color="#414852"
          material="metalness: 0.95; roughness: 0.25; emissive: #0d131c; emissiveIntensity: 0.08;"
        ></a-box>

        <!-- Linhas neon -->
        <a-box
          position="-0.4 0 0.11"
          width="0.025"
          height="0.56"
          depth="0.02"
          color="#4fdcff"
          material="emissive: #37d8ff; emissiveIntensity: 1.15; metalness: 0.08; roughness: 0.1;"
        ></a-box>
        <a-box
          position="0.41 0 0.11"
          width="0.025"
          height="0.58"
          depth="0.02"
          color="#4fdcff"
          material="emissive: #37d8ff; emissiveIntensity: 1.15; metalness: 0.08; roughness: 0.1;"
        ></a-box>

        <a-light type="ambient" color="#d7e8ff" intensity="0.75"></a-light>
        <a-light type="directional" color="#ffffff" intensity="0.85" position="1 2 1"></a-light>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    (function () {
      var errorBox = document.getElementById("error-message");
      var scene = document.getElementById("ar-scene");
      var hasShownError = false;

      function showError(message) {
        if (hasShownError) {
          return;
        }

        hasShownError = true;
        errorBox.textContent = message;
        errorBox.classList.add("is-visible");
      }

      if (!window.isSecureContext && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
        showError("Abra este projeto em HTTPS para liberar a camera no celular.");
      }

      window.addEventListener("camera-error", function () {
        showError("Nao foi possivel acessar a camera. Verifique a permissao do navegador e use HTTPS.");
      });

      window.addEventListener("error", function () {
        if (!hasShownError) {
          showError("A inicializacao da experiencia AR falhou. Recarregue a pagina e confira a permissao da camera.");
        }
      });

      scene.addEventListener("loaded", function () {
        var video = document.querySelector("video");

        if (!video) {
          window.setTimeout(function () {
            if (!document.querySelector("video") && !hasShownError) {
              showError("A camera nao iniciou. Confirme a permissao da camera e teste em um navegador mobile atualizado.");
            }
          }, 4500);
          return;
        }

        video.setAttribute("playsinline", "true");
        video.setAttribute("muted", "true");
      });
    })();
  </script>
</body>
</html>
