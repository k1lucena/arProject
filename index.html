<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>k1 WebAR</title>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.5/aframe/build/aframe-ar.js"></script>
  <style>
    :root {
      --app-height: 100vh;
      --panel: rgba(7, 14, 24, 0.84);
      --border: rgba(74, 209, 255, 0.42);
      --text: #eef8ff;
      --muted: #b7c6d8;
      --error-bg: rgba(75, 12, 20, 0.92);
      --error-border: rgba(255, 111, 145, 0.65);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: var(--app-height);
      min-height: var(--app-height);
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      position: fixed;
      inset: 0;
    }

    a-scene {
      position: fixed !important;
      top: 0 !important;
      right: 0 !important;
      bottom: 0 !important;
      left: 0 !important;
      width: 100vw !important;
      height: var(--app-height) !important;
      min-height: var(--app-height) !important;
      background: transparent !important;
      z-index: 1 !important;
      display: block !important;
    }

    .a-canvas,
    canvas,
    video,
    #arjs-video,
    .arjs-video {
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      background: transparent !important;
    }

    video,
    #arjs-video,
    .arjs-video {
      z-index: 0 !important;
      object-fit: cover !important;
    }

    .a-canvas,
    canvas {
      z-index: 1 !important;
      width: 100vw !important;
      height: var(--app-height) !important;
      min-height: var(--app-height) !important;
    }

    .hud {
      position: fixed;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    .instruction,
    .status,
    .error {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      width: min(92vw, 420px);
      padding: 12px 16px;
      border-radius: 14px;
      background: var(--panel);
      border: 1px solid var(--border);
      text-align: center;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.22);
      backdrop-filter: blur(6px);
    }

    .status {
      top: max(16px, env(safe-area-inset-top));
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .instruction {
      bottom: max(16px, env(safe-area-inset-bottom));
      font-size: 0.98rem;
    }

    .error {
      top: 50%;
      transform: translate(-50%, -50%);
      display: none;
      background: var(--error-bg);
      border-color: var(--error-border);
      font-size: 0.95rem;
      line-height: 1.45;
    }

    .error.is-visible {
      display: block;
    }
  </style>
</head>
<body>
    <div class="hud">
    <div class="status" id="status-label">WebAR k1 | Aguardando marcador Hiro</div>
    <div class="error" id="error-message" role="alert"></div>
    <div class="instruction">Aponte a c&acirc;mera para o marcador impresso.</div>
  </div>

  <a-scene
    id="ar-scene"
    embedded
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    loading-screen="enabled: false"
    renderer="alpha: true; antialias: false; precision: mediump; logarithmicDepthBuffer: false; colorManagement: false; sortObjects: true;"
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono;"
  >
    <a-marker id="hiro-marker" preset="hiro" emitevents="true">
      <a-entity
        id="k1-logo"
        position="0 0.1 0"
        rotation="0 0 0"
        scale="0.76 0.76 0.76"
      >
        <!-- Letra k -->
        <a-box
          position="-0.31 0.12 0"
          width="0.15"
          height="0.62"
          depth="0.16"
          color="#616a77"
          material="shader: standard; metalness: 0.95; roughness: 0.18; emissive: #111926; emissiveIntensity: 0.18;"
        ></a-box>
        <a-box
          position="-0.1 0.24 0"
          width="0.42"
          height="0.11"
          depth="0.14"
          rotation="0 0 42"
          color="#7a8493"
          material="shader: standard; metalness: 0.92; roughness: 0.2; emissive: #111926; emissiveIntensity: 0.16;"
        ></a-box>
        <a-box
          position="-0.09 -0.03 0"
          width="0.44"
          height="0.11"
          depth="0.14"
          rotation="0 0 -42"
          color="#6a7380"
          material="shader: standard; metalness: 0.92; roughness: 0.2; emissive: #111926; emissiveIntensity: 0.16;"
        ></a-box>

        <!-- Numero 1 -->
        <a-box
          position="0.31 0.12 0"
          width="0.16"
          height="0.64"
          depth="0.16"
          color="#707988"
          material="shader: standard; metalness: 0.95; roughness: 0.18; emissive: #111926; emissiveIntensity: 0.18;"
        ></a-box>
        <a-box
          position="0.24 0.32 0"
          width="0.2"
          height="0.1"
          depth="0.14"
          rotation="0 0 -30"
          color="#8a95a6"
          material="shader: standard; metalness: 0.9; roughness: 0.22; emissive: #111926; emissiveIntensity: 0.14;"
        ></a-box>
        <a-box
          position="0.31 -0.18 0"
          width="0.3"
          height="0.1"
          depth="0.16"
          color="#5e6673"
          material="shader: standard; metalness: 0.95; roughness: 0.2; emissive: #111926; emissiveIntensity: 0.14;"
        ></a-box>

        <!-- Neon visivel mesmo com pouca luz -->
        <a-box
          position="-0.39 0.12 0.1"
          width="0.03"
          height="0.5"
          depth="0.03"
          color="#57e2ff"
          material="shader: flat; color: #57e2ff; emissive: #57e2ff; emissiveIntensity: 1.5;"
        ></a-box>
        <a-box
          position="-0.18 0.27 0.1"
          width="0.18"
          height="0.03"
          depth="0.03"
          rotation="0 0 42"
          color="#57e2ff"
          material="shader: flat; color: #57e2ff; emissive: #57e2ff; emissiveIntensity: 1.5;"
        ></a-box>
        <a-box
          position="-0.17 -0.06 0.1"
          width="0.19"
          height="0.03"
          depth="0.03"
          rotation="0 0 -42"
          color="#57e2ff"
          material="shader: flat; color: #57e2ff; emissive: #57e2ff; emissiveIntensity: 1.5;"
        ></a-box>
        <a-box
          position="0.4 0.12 0.1"
          width="0.03"
          height="0.52"
          depth="0.03"
          color="#57e2ff"
          material="shader: flat; color: #57e2ff; emissive: #57e2ff; emissiveIntensity: 1.5;"
        ></a-box>
        <a-box
          position="0.31 -0.19 0.1"
          width="0.23"
          height="0.03"
          depth="0.03"
          color="#57e2ff"
          material="shader: flat; color: #57e2ff; emissive: #57e2ff; emissiveIntensity: 1.5;"
        ></a-box>

        <a-light type="ambient" color="#f3f8ff" intensity="1.15"></a-light>
        <a-light type="directional" color="#ffffff" intensity="1.05" position="1.2 2 1.5"></a-light>
        <a-light type="point" color="#58deff" intensity="0.7" position="0 0.3 0.45"></a-light>
      </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>

  <script>
    (function () {
      var errorBox = document.getElementById("error-message");
      var scene = document.getElementById("ar-scene");
      var marker = document.getElementById("hiro-marker");
      var statusLabel = document.getElementById("status-label");
      var hasShownError = false;

      function showError(message) {
        if (hasShownError) {
          return;
        }

        hasShownError = true;
        errorBox.textContent = message;
        errorBox.classList.add("is-visible");
      }

      if (!window.isSecureContext && location.hostname !== "localhost" && location.hostname !== "127.0.0.1") {
        showError("Abra este projeto em HTTPS para liberar a camera no celular.");
      }

      window.addEventListener("camera-error", function () {
        showError("Nao foi possivel acessar a camera. Verifique a permissao do navegador e use HTTPS.");
      });

      window.addEventListener("camera-init", function () {
        hasShownError = false;
        errorBox.textContent = "";
        errorBox.classList.remove("is-visible");
      });

      marker.addEventListener("markerFound", function () {
        statusLabel.textContent = "WebAR k1 | Marcador Hiro detectado";
      });

      marker.addEventListener("markerLost", function () {
        statusLabel.textContent = "WebAR k1 | Aguardando marcador Hiro";
      });

      scene.addEventListener("loaded", function () {
        syncViewport();
        var video = document.querySelector("video");
        var sceneCanvas = scene.canvas;

        if (sceneCanvas) {
          sceneCanvas.style.backgroundColor = "transparent";
        }

        if (!video) {
          window.setTimeout(function () {
            if (!document.querySelector("video") && !hasShownError) {
              showError("A camera nao iniciou. Confirme a permissao da camera e teste em um navegador mobile atualizado.");
            }
          }, 4500);
          return;
        }

        prepareVideo(video);
      });

      scene.addEventListener("renderstart", function () {
        syncViewport();
        var video = document.querySelector("video");

        if (scene.canvas) {
          scene.canvas.style.backgroundColor = "transparent";
        }

        if (scene.renderer) {
          scene.renderer.setClearColor(0x000000, 0);
        }

        if (video) {
          prepareVideo(video);
        }
      });

      window.addEventListener("resize", syncViewport);
      window.addEventListener("orientationchange", syncViewport);

      if (window.visualViewport) {
        window.visualViewport.addEventListener("resize", syncViewport);
        window.visualViewport.addEventListener("scroll", syncViewport);
      }

      function prepareVideo(video) {
        video.setAttribute("playsinline", "true");
        video.setAttribute("webkit-playsinline", "true");
        video.setAttribute("autoplay", "true");
        video.setAttribute("muted", "true");
        video.style.backgroundColor = "transparent";
        video.style.objectFit = "cover";
        video.style.maxWidth = "none";
        video.style.maxHeight = "none";
        video.style.position = "fixed";
        video.style.zIndex = "0";
        applyVideoCover(video);

        if (video.readyState >= 2) {
          errorBox.textContent = "";
          errorBox.classList.remove("is-visible");
          hasShownError = false;
          return;
        }

        video.addEventListener(
          "loadeddata",
          function () {
            errorBox.textContent = "";
            errorBox.classList.remove("is-visible");
            hasShownError = false;
            applyVideoCover(video);
          },
          { once: true }
        );

        video.addEventListener(
          "loadedmetadata",
          function () {
            applyVideoCover(video);
          },
          { once: true }
        );
      }

      function syncViewport() {
        var viewport = window.visualViewport;
        var width = viewport ? Math.round(viewport.width) : window.innerWidth;
        var height = viewport ? Math.round(viewport.height) : window.innerHeight;
        var video = document.querySelector("video");
        var heightPx = height + "px";

        document.documentElement.style.setProperty("--app-height", heightPx);

        scene.style.width = width + "px";
        scene.style.height = heightPx;
        scene.style.minHeight = heightPx;
        scene.style.top = "0";
        scene.style.left = "0";
        scene.style.right = "0";
        scene.style.bottom = "0";

        if (scene.canvas) {
          scene.canvas.style.width = width + "px";
          scene.canvas.style.height = heightPx;
          scene.canvas.style.minHeight = heightPx;
          scene.canvas.style.backgroundColor = "transparent";
          scene.canvas.style.top = "0";
          scene.canvas.style.left = "0";
          scene.canvas.style.right = "0";
          scene.canvas.style.bottom = "0";
        }

        if (video) {
          applyVideoCover(video);
        }
      }

      function applyVideoCover(video) {
        var viewport = window.visualViewport;
        var viewportWidth = viewport ? Math.round(viewport.width) : window.innerWidth;
        var viewportHeight = viewport ? Math.round(viewport.height) : window.innerHeight;
        var videoWidth = video.videoWidth || 1280;
        var videoHeight = video.videoHeight || 720;
        var viewportRatio = viewportWidth / viewportHeight;
        var videoRatio = videoWidth / videoHeight;
        var renderWidth;
        var renderHeight;

        if (viewportRatio > videoRatio) {
          renderWidth = viewportWidth;
          renderHeight = viewportWidth / videoRatio;
        } else {
          renderHeight = viewportHeight;
          renderWidth = viewportHeight * videoRatio;
        }

        video.style.width = renderWidth + "px";
        video.style.height = renderHeight + "px";
        video.style.minWidth = renderWidth + "px";
        video.style.minHeight = renderHeight + "px";
        video.style.left = Math.round((viewportWidth - renderWidth) / 2) + "px";
        video.style.top = Math.round((viewportHeight - renderHeight) / 2) + "px";
      }
    })();
  </script>
</body>
</html>
